<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Karachi Pizza POS</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a0a;
      color: #ffffff;
    }
    #root {
      min-height: 100vh;
    }
    
    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #1a1a1a; }
    ::-webkit-scrollbar-thumb { background: linear-gradient(180deg, #f97316, #ea580c); border-radius: 10px; }
    
    /* Glassmorphism Card */
    .glass-card {
      background: rgba(26, 26, 26, 0.8);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(249, 115, 22, 0.1);
      border-radius: 24px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .glass-card:hover {
      border-color: rgba(249, 115, 22, 0.3);
      box-shadow: 0 8px 40px rgba(249, 115, 22, 0.05);
      transform: translateY(-2px);
    }
    
    /* Buttons */
    .btn-primary {
      background: linear-gradient(135deg, #f97316, #ea580c);
      color: #0a0a0a;
      font-weight: 600;
      padding: 12px 28px;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      font-size: 1rem;
    }
    .btn-primary:hover {
      transform: translateY(-2px) scale(1.02);
      box-shadow: 0 8px 30px rgba(249, 115, 22, 0.3);
    }
    .btn-primary:active {
      transform: scale(0.98);
    }
    
    /* Sidebar */
    .sidebar {
      background: rgba(10, 10, 10, 0.95);
      backdrop-filter: blur(10px);
      border-right: 1px solid rgba(255, 255, 255, 0.05);
      width: 280px;
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
    }
    .sidebar-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 16px;
      border-radius: 14px;
      color: #888;
      transition: all 0.3s ease;
      cursor: pointer;
      font-weight: 500;
      position: relative;
    }
    .sidebar-item:hover {
      color: #fff;
      background: rgba(249, 115, 22, 0.08);
    }
    .sidebar-item.active {
      color: #f97316;
      background: rgba(249, 115, 22, 0.12);
    }
    .sidebar-item.active::before {
      content: '';
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      width: 3px;
      height: 24px;
      background: #f97316;
      border-radius: 0 4px 4px 0;
    }
    .sidebar-item i {
      width: 24px;
      font-size: 1.1rem;
    }
    .sidebar-item .badge {
      margin-left: auto;
      background: #f97316;
      color: #0a0a0a;
      padding: 2px 10px;
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: 700;
    }
    
    /* Menu Grid */
    .menu-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 16px;
    }
    .menu-item {
      background: #1a1a1a;
      border-radius: 20px;
      padding: 16px 12px;
      text-align: center;
      border: 1px solid transparent;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      cursor: pointer;
    }
    .menu-item:hover {
      border-color: #f97316;
      background: #222;
      transform: translateY(-4px);
      box-shadow: 0 12px 40px rgba(249, 115, 22, 0.08);
    }
    .menu-item .price {
      color: #f97316;
      font-weight: 700;
      font-size: 1.1rem;
    }
    .menu-item .item-icon {
      font-size: 2rem;
      margin-bottom: 8px;
    }
    
    /* Cart Item */
    .cart-item {
      background: #141414;
      border-radius: 16px;
      padding: 12px 16px;
      margin-bottom: 8px;
      border-left: 3px solid #f97316;
      transition: all 0.3s ease;
    }
    .cart-item:hover {
      background: #1a1a1a;
    }
    
    /* Input Fields */
    .input-field {
      background: #141414;
      border: 1px solid #2a2a2a;
      color: #fff;
      padding: 12px 16px;
      border-radius: 14px;
      width: 100%;
      transition: all 0.3s ease;
      font-size: 0.95rem;
    }
    .input-field:focus {
      outline: none;
      border-color: #f97316;
      box-shadow: 0 0 0 3px rgba(249, 115, 22, 0.1);
    }
    .input-field::placeholder {
      color: #555;
    }
    
    /* Login */
    .login-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse at center, #1a1a1a 0%, #0a0a0a 100%);
      padding: 20px;
    }
    .login-box {
      background: rgba(20, 20, 20, 0.9);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(249, 115, 22, 0.15);
      border-radius: 32px;
      padding: 48px 40px;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 40px 80px rgba(0, 0, 0, 0.5);
    }
    .login-box .logo {
      text-align: center;
      margin-bottom: 36px;
    }
    .login-box .logo .icon {
      font-size: 4rem;
      margin-bottom: 12px;
      display: block;
    }
    .login-box .logo h1 {
      font-size: 2.2rem;
      font-weight: 800;
      background: linear-gradient(135deg, #f97316, #ea580c);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .login-box .logo p {
      color: #666;
      font-size: 0.95rem;
    }
    
    /* Responsive */
    @media (max-width: 768px) {
      .sidebar {
        width: 72px;
        padding: 16px 8px;
      }
      .sidebar-item span {
        display: none;
      }
      .sidebar-item .badge {
        display: none;
      }
      .login-box {
        padding: 32px 24px;
      }
      .menu-grid {
        grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      }
    }
    @media (max-width: 480px) {
      .menu-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 10px;
      }
      .glass-card {
        padding: 12px !important;
      }
    }
    
    /* Animations */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    .fade-in-up {
      animation: fadeInUp 0.5s ease forwards;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    .pulse {
      animation: pulse 2s infinite;
    }
    
    /* Status Badges */
    .status-badge {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .status-badge.completed {
      background: rgba(34, 197, 94, 0.15);
      color: #22c55e;
    }
    .status-badge.pending {
      background: rgba(234, 179, 8, 0.15);
      color: #eab308;
    }
    .status-badge.cancelled {
      background: rgba(239, 68, 68, 0.15);
      color: #ef4444;
    }
    .status-badge.preparing {
      background: rgba(59, 130, 246, 0.15);
      color: #3b82f6;
    }
    
    /* Stats Card */
    .stat-card {
      padding: 16px 20px;
      background: #141414;
      border-radius: 16px;
      border: 1px solid #1f1f1f;
      transition: all 0.3s ease;
    }
    .stat-card:hover {
      border-color: #f97316;
      background: #1a1a1a;
    }
    .stat-card .stat-icon {
      font-size: 1.5rem;
      color: #f97316;
      opacity: 0.8;
    }
    .stat-card .stat-value {
      font-size: 1.5rem;
      font-weight: 700;
      margin-top: 4px;
      background: linear-gradient(135deg, #f97316, #ea580c);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .stat-card .stat-label {
      color: #666;
      font-size: 0.8rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    /* Table */
    .table-container {
      overflow-x: auto;
      border-radius: 16px;
      border: 1px solid #1f1f1f;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    thead {
      background: #141414;
    }
    th {
      padding: 14px 16px;
      text-align: left;
      color: #888;
      font-weight: 600;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    td {
      padding: 12px 16px;
      border-top: 1px solid #1a1a1a;
      color: #ddd;
    }
    tr:hover td {
      background: rgba(249, 115, 22, 0.03);
    }
  </style>
</head>
<body>
  <div id="root"></div>
  
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom": "https://esm.sh/react-dom@18.2.0",
        "react/jsx-runtime": "https://esm.sh/react@18.2.0/jsx-runtime"
      }
    }
  </script>
  
  <script type="module">
    import React, { useState, useEffect, useMemo, createContext, useContext } from 'react';
    import ReactDOM from 'react-dom/client';
    
    // ============ CONTEXT ============
    const AppContext = createContext();
    
    // ============ MENU DATA ============
    const MENU_DATA = {
      '🍕 Pizza': [
        { name: 'Crown Crust Pizza', variants: [{ size: 'Small', price: 1499 }, { size: 'Medium', price: 1999 }] },
        { name: 'Lazania Pizza', variants: [{ size: 'Small', price: 1699 }, { size: 'Medium', price: 2199 }] },
        { name: 'Malai Boti Pizza', variants: [{ size: 'Small', price: 459 }, { size: 'Medium', price: 1099 }, { size: 'Large', price: 1799 }] },
        { name: 'Fajita Pizza', variants: [{ size: 'Small', price: 450 }, { size: 'Medium', price: 950 }, { size: 'Large', price: 1550 }] },
        { name: 'Tikka Pizza', variants: [{ size: 'Small', price: 499 }, { size: 'Medium', price: 999 }, { size: 'Large', price: 1499 }] },
        { name: 'Supreme Pizza', variants: [{ size: 'Small', price: 450 }, { size: 'Medium', price: 999 }, { size: 'Large', price: 1599 }] },
        { name: 'Hot & Spicy Pizza', variants: [{ size: 'Small', price: 499 }, { size: 'Medium', price: 999 }, { size: 'Large', price: 1499 }] },
        { name: 'KBS Pizza', variants: [{ size: 'Small', price: 599 }, { size: 'Medium', price: 1199 }, { size: 'Large', price: 1899 }] },
        { name: 'Extra Toppings', variants: [{ size: 'Small', price: 150 }, { size: 'Medium', price: 250 }, { size: 'Large', price: 350 }] },
      ],
      '🍔 Burgers': [
        { name: 'KBS Special Pizza Burger', price: 499 }, { name: 'Zinger Burger', price: 350 },
        { name: 'Zinger Cheese Burger', price: 400 }, { name: 'Chicken Grill Burger', price: 300 },
        { name: 'Chicken Grill Cheese Burger', price: 350 }, { name: 'Classic Chicken Burger', price: 300 },
        { name: 'Classic Chicken Cheese Burger', price: 250 }, { name: 'Beef Patti Burger', price: 250 },
        { name: 'Beef Patti Cheese Burger', price: 300 }
      ],
      '🥩 BBQ': [
        { name: 'Chicken Tikka Breast Piece', price: 399 }, { name: 'Chicken Tikka Leg Piece', price: 399 },
        { name: 'Chicken Tikka Boti Boneless', price: 450 }, { name: 'Malai Boti Boneless', price: 499 },
        { name: 'Beef Boti', price: 450 }, { name: 'Seekh Kebab 6 pcs', price: 499 },
        { name: 'Reshmi Kebab 6 pcs', price: 499 }, { name: 'Namkeen Tikka Chicken', price: 499 },
        { name: 'Namkeen Afghani Beef Boti Seekh', price: 200 }, { name: 'Grill Fish BBQ', price: 0 }
      ],
      '🥘 Karahi': [
        { name: 'Chicken Karahi Full', price: 1999 }, { name: 'Chicken Karahi Half', price: 999 },
        { name: 'Beef Karahi Full', price: 2499 }, { name: 'Beef Karahi Half', price: 1199 },
        { name: 'Mutton Karahi Full', price: 3499 }, { name: 'Mutton Karahi Half', price: 1899 }
      ],
      '🍲 Handi': [
        { name: 'Chicken Handi Full', price: 2000 }, { name: 'Chicken Handi Half', price: 1000 },
        { name: 'Beef Handi Full', price: 1999 }, { name: 'Beef Handi Half', price: 1199 },
        { name: 'Mutton Handi Full', price: 3299 }, { name: 'Mutton Handi Half', price: 1599 }
      ],
      '🥤 Shakes': [
        { name: 'Mango Juice', price: 250 }, { name: 'Banana Juice', price: 250 },
        { name: 'Apple Juice', price: 250 }, { name: 'Strawberry Juice', price: 250 }
      ],
      '🍦 Ice Cream': [
        { name: 'Sada Ice Cream', price: 150 }, { name: 'Special Ice Cream', price: 250 },
        { name: 'Strawberry Ice Cream', price: 250 }
      ],
      '🍧 Falooda': [{ name: 'Special Falooda', price: 250 }],
      '🍛 Biryani': [
        { name: 'Chicken Biryani Full', price: 400 }, { name: 'Chicken Biryani Half', price: 200 },
        { name: 'Chicken Biryani Sada', price: 100 }, { name: 'Beef Pulao Full', price: 500 },
        { name: 'Beef Pulao Half', price: 250 }, { name: 'Sada Pulao', price: 150 }
      ],
      '🌯 Rolls': [
        { name: 'Chicken Shawarma', price: 200 }, { name: 'Chicken Cheese Shawarma', price: 250 },
        { name: 'Shawarma Platter', price: 350 }, { name: 'Chicken Tikka Roll', price: 250 },
        { name: 'Beef Garlic Roll', price: 250 }
      ],
      '🍟 Fries': [
        { name: 'KBS Pizza Fries', price: 599 }, { name: 'Loaded Fries', price: 499 },
        { name: 'Masala Fries', price: 250 }, { name: 'Masala Cheese Fries', price: 300 },
        { name: 'Plain Fries', price: 200 }
      ]
    };

    const flatMenu = [];
    Object.entries(MENU_DATA).forEach(([category, items]) => {
      items.forEach(item => {
        if (item.variants) {
          item.variants.forEach(v => {
            flatMenu.push({ name: `${item.name} (${v.size})`, price: v.price, category, size: v.size });
          });
        } else {
          flatMenu.push({ name: item.name, price: item.price, category });
        }
      });
    });

    let ordersDB = [];

    // ============ LOGIN COMPONENT ============
    const Login = ({ onLogin }) => {
      const [username, setUsername] = useState('');
      const [password, setPassword] = useState('');
      const [error, setError] = useState('');
      const [loading, setLoading] = useState(false);

      const handleSubmit = async (e) => {
        e.preventDefault();
        setLoading(true);
        setError('');
        
        // Simulate API call
        await new Promise(resolve => setTimeout(resolve, 500));
        
        if (username === 'manager' && password === '1234') {
          onLogin();
        } else {
          setError('Invalid credentials. Use: manager / 1234');
        }
        setLoading(false);
      };

      return (
        <div className="login-container">
          <div className="login-box fade-in-up">
            <div className="logo">
              <span className="icon">🍕</span>
              <h1>Karachi Pizza</h1>
              <p>Premium Restaurant POS System</p>
            </div>
            
            <form onSubmit={handleSubmit}>
              {error && (
                <div style={{
                  background: 'rgba(239,68,68,0.1)',
                  border: '1px solid rgba(239,68,68,0.2)',
                  color: '#ef4444',
                  padding: '12px 16px',
                  borderRadius: '12px',
                  marginBottom: '20px',
                  display: 'flex',
                  alignItems: 'center',
                  gap: '8px',
                  fontSize: '0.9rem'
                }}>
                  <i className="fas fa-exclamation-circle"></i>
                  {error}
                </div>
              )}
              
              <div style={{ marginBottom: '20px' }}>
                <label style={{ display: 'block', color: '#888', fontSize: '0.85rem', marginBottom: '6px', fontWeight: '500' }}>
                  <i className="fas fa-user" style={{ marginRight: '8px' }}></i>
                  Username
                </label>
                <input
                  type="text"
                  className="input-field"
                  placeholder="Enter username"
                  value={username}
                  onChange={(e) => setUsername(e.target.value)}
                  required
                />
              </div>
              
              <div style={{ marginBottom: '24px' }}>
                <label style={{ display: 'block', color: '#888', fontSize: '0.85rem', marginBottom: '6px', fontWeight: '500' }}>
                  <i className="fas fa-lock" style={{ marginRight: '8px' }}></i>
                  Password
                </label>
                <input
                  type="password"
                  className="input-field"
                  placeholder="Enter password"
                  value={password}
                  onChange={(e) => setPassword(e.target.value)}
                  required
                />
              </div>
              
              <button type="submit" className="btn-primary" style={{ width: '100%', padding: '14px', fontSize: '1.05rem' }} disabled={loading}>
                {loading ? (
                  <i className="fas fa-spinner fa-spin"></i>
                ) : (
                  <><i className="fas fa-sign-in-alt" style={{ marginRight: '10px' }}></i> Sign In</>
                )}
              </button>
            </form>
            
            <div style={{ marginTop: '24px', paddingTop: '24px', borderTop: '1px solid #1f1f1f' }}>
              <div style={{ 
                background: '#141414', 
                borderRadius: '12px', 
                padding: '12px 16px',
                border: '1px solid #1f1f1f'
              }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', color: '#666', fontSize: '0.85rem', padding: '4px 0' }}>
                  <span>Demo Username:</span>
                  <span style={{ color: '#f97316', fontWeight: '600' }}>manager</span>
                </div>
                <div style={{ display: 'flex', justifyContent: 'space-between', color: '#666', fontSize: '0.85rem', padding: '4px 0' }}>
                  <span>Demo Password:</span>
                  <span style={{ color: '#f97316', fontWeight: '600' }}>1234</span>
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    };

    // ============ MAIN APP ============
    const App = () => {
      const [loggedIn, setLoggedIn] = useState(false);
      const [view, setView] = useState('dashboard');
      const [cart, setCart] = useState([]);
      const [orderType, setOrderType] = useState('Dine In');
      const [paymentMethod, setPaymentMethod] = useState('Cash');
      const [discount, setDiscount] = useState(0);
      const [tax] = useState(0.1);
      const [serviceCharge, setServiceCharge] = useState(0);
      const [orders, setOrders] = useState([]);
      const [selectedCategory, setSelectedCategory] = useState('All');
      const [searchTerm, setSearchTerm] = useState('');
      const [notifications, setNotifications] = useState([]);
      const [darkMode, setDarkMode] = useState(true);

      useEffect(() => {
        if (ordersDB.length === 0) {
          for (let i = 0; i < 12; i++) {
            const randItem = flatMenu[Math.floor(Math.random() * flatMenu.length)];
            const statuses = ['Pending', 'Preparing', 'Ready', 'Completed', 'Cancelled'];
            ordersDB.push({
              id: 'ORD' + String(i + 100).padStart(3, '0'),
              date: new Date(Date.now() - i * 3600000).toLocaleString(),
              items: [{ ...randItem, qty: 1 + Math.floor(Math.random() * 3) }],
              orderType: ['Dine In', 'Take Away', 'Delivery'][i % 3],
              paymentMethod: ['Cash', 'Card', 'Bank Transfer', 'Mobile Wallet'][i % 4],
              subtotal: randItem.price * 2,
              tax: randItem.price * 0.1,
              discount: 0,
              serviceCharge: 50,
              total: randItem.price * 2 * 1.1 + 50,
              status: statuses[i % 5],
              customer: ['Ali Khan', 'Sara Ahmed', 'Usman Malik', 'Fatima Noor', 'Ahmed Raza', 'Zara Ali'][i % 6]
            });
          }
          setOrders([...ordersDB]);
        }
      }, []);

      const addToCart = (item) => {
        const existing = cart.find(i => i.name === item.name && i.size === item.size);
        if (existing) {
          setCart(cart.map(i => i.name === item.name && i.size === item.size ? { ...i, qty: i.qty + 1 } : i));
        } else {
          setCart([...cart, { ...item, qty: 1 }]);
        }
        setNotifications([...notifications, { id: Date.now(), message: `Added ${item.name}`, type: 'success' }]);
      };

      const removeItem = (idx) => setCart(cart.filter((_, i) => i !== idx));
      const updateQty = (idx, delta) => {
        const newCart = [...cart];
        if (newCart[idx].qty + delta <= 0) { newCart.splice(idx, 1); } else { newCart[idx].qty += delta; }
        setCart(newCart);
      };

      const calcTotal = () => {
        let sub = cart.reduce((acc, i) => acc + (i.price || 0) * i.qty, 0);
        let taxAmt = sub * tax;
        let discAmt = sub * (discount / 100);
        let total = sub + taxAmt + serviceCharge - discAmt;
        return { subtotal: sub, tax: taxAmt, discount: discAmt, total };
      };

      const saveOrder = () => {
        if (cart.length === 0) { 
          setNotifications([...notifications, { id: Date.now(), message: 'Cart is empty!', type: 'error' }]);
          return; 
        }
        const { subtotal, tax: taxAmt, discount: discAmt, total } = calcTotal();
        const order = {
          id: 'ORD' + String(ordersDB.length + 1).padStart(3, '0'),
          date: new Date().toLocaleString(),
          items: cart,
          orderType, paymentMethod, subtotal, tax: taxAmt, discount: discAmt, serviceCharge, total,
          status: 'Completed', customer: 'Walk-in'
        };
        ordersDB = [order, ...ordersDB];
        setOrders([...ordersDB]);
        setCart([]);
        setDiscount(0);
        setServiceCharge(0);
        setNotifications([...notifications, { id: Date.now(), message: `✅ Order #${order.id} saved!`, type: 'success' }]);
      };

      const stats = useMemo(() => {
        const today = new Date().toDateString();
        const todayOrders = orders.filter(o => new Date(o.date).toDateString() === today);
        const totalSales = todayOrders.reduce((s, o) => s + o.total, 0);
        const customers = [...new Set(todayOrders.map(o => o.customer).filter(Boolean))];
        return {
          todaySales: totalSales,
          todayCustomers: customers.length,
          todayOrders: todayOrders.length,
          pending: orders.filter(o => o.status === 'Pending').length,
